<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messages</title>
<style>
.message { border: 1px solid #ccc; padding: 5px; margin: 5px 0; }
</style>
</head>
<body>

<h1>Messages</h1>

<div id="messages"></div>

<h3>Send Message</h3>
<input type="text" id="to" placeholder="Recipient Username"><br>
<textarea id="content" placeholder="Message content"></textarea><br>
<button onclick="sendMessage()">Send</button>

<button onclick="goHome()">Home</button>


<script>
async function fetchMessages() {
    const res = await fetch('https://cx474y-5000.csb.app/api/messages', {
        credentials: 'include'
    });
    const data = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    if (data.success) {
        data.data.forEach(m => {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<strong>From ${m.from}</strong>: ${m.content}`;
            container.appendChild(div);
        });
    } else {
        alert(data.error);
    }
}

async function sendMessage() {
    const to = document.getElementById('to').value;
    const content = document.getElementById('content').value;
    const res = await fetch('https://cx474y-5000.csb.app/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to, content }),
        credentials: 'include'
    });
    const data = await res.json();
    if (data.success) {
        document.getElementById('to').value = '';
        document.getElementById('content').value = '';
        fetchMessages();
    } else {
        alert(data.error);
    }
}

function goHome() { window.location.href = 'index.html'; }

fetchMessages();
</script>

</body>
</html>
