<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waxmos (BETA)</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(teal, black); background-repeat: no-repeat; min-height: 100vh;
      color: #111;
    }

    .topbar {
      background: linear-gradient(#3a2a1a, #1f140a);
      color: red;
      padding: 6px 12px;
      font-size: 13px;
      border-bottom: 1px solid #000;
      text-align: left; display: none;
    }

    .container {
      max-width: 960px;
      margin: 20px auto;
      background: black;
      border: 1px solid teal;
      padding: 20px;
    }

    header {
      text-align: left;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 64px;
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px 0 #000000, 1px 1px 0 #00000000;
    }

    h1 small {
      font-size: 12px;
      vertical-align: super;
    }

    .search-box {
      display: flex;
      margin: 15px 0;
      border: 1px solid #333;
      background: linear-gradient(#fff, lightgrey);
    }

    .search-box input {
      flex: 1;
      padding: 10px;
      border: none;
      font-size: 16px;
      outline: none;
      background: transparent;
    }

    .search-box button {
      background: linear-gradient(maroon, darkred);
      color: #ffd700;
      border: none;
      padding: 0 20px;
      font-weight: bold;
      cursor: pointer;
      border-left: 1px solid #000;
    }

    .search-box button:hover {
      background: linear-gradient(darkred, maroon);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .card {
      background: linear-gradient(#fffbe6, grey);
      border: 1px solid #5a3b1a;
      padding: 10px;
      text-align: left;
      box-shadow: inset 0 1px 0 #fff;
    }

    .card h3 {
      font-size: 16px;
      margin-bottom: 6px;
      border-bottom: 1px solid #c9a227;
      padding-bottom: 4px;
      color: #3a2a1a;
    }

    .card ul {
      list-style: none;
      font-size: 14px;
    }

    .card li {
      margin: 4px 0;
    }

    .card a {
      text-decoration: none;
      color: #000;
    }

    .card a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #333;
      text-align: center;
      border-top: 1px solid #c9a227;
      padding-top: 10px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    Waxmos
  </div>

  <div class="container">
    <header>
      <h1>Waxmos<small>™BETA</small></h1>
    </header>

      <div class="card">
        <h3>Why it's called Waxmos | <small>by <b>Clutch</b></small></h3>
        <p>There's no real reason behind it being called Waxmos; I wanted to make a six letter word (like Google and Mojeek).</p>
      </div>
    <footer>
      © Waxmos. All rights reserved.
    </footer>
  </div>

</body>
</html>
