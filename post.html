<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post</title>
<style>
.reply { border-top: 1px solid #ccc; margin-top: 5px; padding-top: 5px; }
</style>
</head>
<body>

<h1>Post</h1>
<div id="post"></div>

<h3>Reply</h3>
<textarea id="reply"></textarea>
<button onclick="replyPost()">Reply</button>

<button onclick="goHome()">Home</button>

<script>
const params = new URLSearchParams(window.location.search);
const postId = params.get('id');

async function fetchPost() {
    const res = await fetch(`https://cx474y-5000.csb.app/api/posts/${postId}`);
    const data = await res.json();
    if (!data.success) { alert(data.error); return; }
    const p = data.data;
    const container = document.getElementById('post');
    container.innerHTML = `<strong>${p.author}</strong><br>${p.content}<br>Likes: ${p.likes}<br><h4>Replies:</h4>`;
    p.replies.forEach(r => {
        const div = document.createElement('div');
        div.className = 'reply';
        div.innerHTML = `<strong>${r.author}</strong>: ${r.content}`;
        container.appendChild(div);
    });
}

async function replyPost() {
    const content = document.getElementById('reply').value;
    await fetch(`https://cx474y-5000.csb.app/api/posts/${postId}/reply`, {
        method:'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({content})
    });
    document.getElementById('reply').value = '';
    fetchPost();
}

function goHome() { window.location.href='index.html'; }

fetchPost();
</script>

</body>
</html>
