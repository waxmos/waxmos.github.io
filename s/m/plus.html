<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: darkblue; margin-top: 5px;
        }

        h1 {
            margin-bottom: 10px; color: white;
        }

        input {
            width: 88%;
            font-size: 16px;
        }

        button {
            padding: 1px 4px;
            font-size: 16px;
            cursor: pointer; background: orangered; color: white; border-color: orangered;
        }

        table {
            margin-top: 25px;
            border-collapse: collapse;
            width: 100%;
            background: white;
        }

        th, td {
            vertical-align: top;
        }

        th {
            background: linear-gradient(#4b5366, #75819e);
        }

        tr:hover {
            background-color: grey;
        }
td {            padding: 10px;
   }
        .url {
            font-size: 13px;
            color: #ffb900;
        }

        .title a {
            font-weight: bold;
            color: maroon;
            text-decoration: none;
        }

        .title a:hover {
            text-decoration: underline;
        }

        .snippet {
            color: #444;
            font-size: 14px;
        }

        .score {
            font-size: 12px;
            color: #888;
        } .left {text-align: left}
        .suggestions-box {
    position: absolute;
    background: white;
    width: 88%;
    border: 1px solid #ccc;
    max-height: 200px;
    overflow-y: auto;
    z-index: 1000;
}

.suggestion-item {
    padding: 8px;
    cursor: pointer;
}

.suggestion-item:hover {
    background: #eee;
}
    </style>
</head>
<body>

<h1>waxmos™</h1>

<input type="text" id="searchBox" placeholder=" ">
<button onclick="doSearch()">Search</button><div id="suggestions" class="suggestions-box"></div>
<table>
    <thead>
        <tr>
            <th class="left">Result</th>
            <th>Score</th>
        </tr>
    </thead>
    <tbody id="resultsBody">
    </tbody>
</table>
<script>
function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}

async function doSearch(queryOverride = null) {
    const input = document.getElementById("searchBox");
    const query = queryOverride || input.value.trim();
    if (!query) return;

    const newUrl = `${window.location.pathname}?q=${encodeURIComponent(query)}`;
    window.history.pushState({}, "", newUrl);
    input.value = query;

    const tbody = document.getElementById("resultsBody");
    tbody.innerHTML = "<tr><td colspan='2'>Loading...</td></tr>";

    try {
        const [res1, res2] = await Promise.all([
            fetch(`https://dcm3qw-5000.csb.app/api/search?q=${encodeURIComponent(query)}`),
            fetch(`https://mkkp33-5000.csb.app/search?q=${encodeURIComponent(query)}`)
        ]);

        const data1 = await res1.json();
        const data2 = await res2.json();

        let combined = [];

        if (data1 && data1.length > 0) {
            data1.forEach(item => {
                combined.push({
                    title: item.title,
                    url: item.url,
                    snippet: item.snippet || "",
                    score: Number(item.score) || 0,
                    source: "waxmos"
                });
            });
        }

        if (data2 && data2.results && data2.results.length > 0) {
            data2.results.forEach((item, index) => {
                let score = 50; // base score

                if (item.title.toLowerCase().includes(query.toLowerCase())) score += 20;
                if (item.content.toLowerCase().includes(query.toLowerCase())) score += 10;

                // slight decay by position
                score -= index;

                combined.push({
                    title: escapeHTML(item.title),
                    url: item.url,
                    snippet: escapeHTML(item.content.slice(0, 200)) + "...",
                    score: score,
                    source: "citrane"
                });
            });
        }

        const scores = combined.map(r => r.score);
        const min = Math.min(...scores);
        const max = Math.max(...scores);

        combined = combined.map(r => ({
            ...r,
            normScore: max === min ? 50 : ((r.score - min) / (max - min)) * 100
        }));

// Split by source
const waxmos = combined
    .filter(r => r.source === "waxmos")
    .sort((a, b) => b.normScore - a.normScore);

const citrane = combined
    .filter(r => r.source === "citrane")
    .sort((a, b) => b.normScore - a.normScore);

let i = 0, j = 0;
const merged = [];

while (i < waxmos.length || j < citrane.length) {
    const w = waxmos[i];
    const c = citrane[j];

    if (w && c) {
        if (w.normScore >= c.normScore) {
            merged.push(w);
            i++;
        } else {
            merged.push(c);
            j++;
        }

        if (merged[merged.length - 1]?.source === "waxmos" && c) {
            merged.push(c);
            j++;
        } else if (w) {
            merged.push(w);
            i++;
        }

    } else if (w) {
        merged.push(w);
        i++;
    } else if (c) {
        merged.push(c);
        j++;
    }
}

combined = merged;
        tbody.innerHTML = "";

        if (combined.length === 0) {
            tbody.innerHTML = "<tr><td colspan='2'>No results found</td></tr>";
            return;
        }

        combined.forEach(item => {
            const row = document.createElement("tr");

            const resultCell = document.createElement("td");
            const scoreCell = document.createElement("td");

            resultCell.innerHTML = `
                <div class="title">
                    <a href="${item.url}" target="_blank">${item.title}</a>
                </div>
                <div class="url">${item.url}</div>
                <div class="snippet">${item.snippet}</div>
                <div class="score">Source: ${item.source}</div>
            `;

            scoreCell.innerHTML = `
                <div class="score">${item.normScore.toFixed(1)}</div>
            `;

            row.appendChild(resultCell);
            row.appendChild(scoreCell);
            tbody.appendChild(row);
        });

    } catch (err) {
        console.error(err);
        tbody.innerHTML = "<tr><td colspan='2'>Error loading results</td></tr>";
    }
}

function escapeHTML(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}

document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("searchBox");

    input.addEventListener("keydown", e => {
        if (e.key === "Enter") doSearch();
    });
const suggestionsBox = document.getElementById("suggestions");

input.addEventListener("input", async () => {
    const query = input.value.trim();
    
    if (query.length < 2) {
        suggestionsBox.innerHTML = "";
        return;
    }

    try {
        const res = await fetch(`https://mkkp33-5000.csb.app/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (!data.results) return;

        suggestionsBox.innerHTML = "";

        data.results.slice(0, 5).forEach(item => {
            const div = document.createElement("div");
            div.className = "suggestion-item";
            div.textContent = item.title;

            div.onclick = () => {
                input.value = item.title;
                suggestionsBox.innerHTML = "";
                doSearch(item.title);
            };

            suggestionsBox.appendChild(div);
        });

    } catch (err) {
        console.error(err);
    }
});
document.addEventListener("click", (e) => {
    if (!e.target.closest("#searchBox")) {
        suggestionsBox.innerHTML = "";
    }
});
    const q = getQueryParam("q");
    if (q) doSearch(q);
});
</script>
<script>
</script><footer>&copy; Waxmos. All rights reserved.</footer>
</body>
</html>
