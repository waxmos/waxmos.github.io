<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
</head>
<body>

<h1 id="username"></h1>
<p id="bio"></p>
<ul id="links"></ul>

<h2>Posts</h2>
<div id="posts"></div>

<button onclick="goHome()">Home</button>

<script>
const params = new URLSearchParams(window.location.search);
const username = params.get('username');

async function fetchProfile() {
    const res = await fetch(`https://cx474y-5000.csb.app/api/users/${username}`, {
        credentials: 'include'
    });
    const data = await res.json();
    if (!data.success) { alert(data.error); return; }

    document.getElementById('username').innerText = data.data.username;
    document.getElementById('bio').innerText = data.data.bio || "No bio yet.";

    const linksEl = document.getElementById('links');
    linksEl.innerHTML = '';
    data.data.links.forEach(l => {
        if (l) linksEl.innerHTML += `<li><a href="${l}" target="_blank">${l}</a></li>`;
    });

    const postsEl = document.getElementById('posts');
    postsEl.innerHTML = '';
    data.data.posts.forEach(p => {
        postsEl.innerHTML += `<div>${p.content}</div>`;
    });
}

function goHome() { window.location.href='index.html'; }

fetchProfile();
</script>
</body>
</html>
